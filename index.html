const useLocalStorage = (key, initialValue) => {
    const [value, setValue] = useState(() => {
        try {
            const item = window.localStorage.getItem(key);
            return item ? JSON.parse(item) : initialValue;
        } catch (error) { return initialValue; }
    });
    useEffect(() => { try { window.localStorage.setItem(key, JSON.stringify(value)); } catch(e){} }, [key, value]);
    return [value, setValue];
};

const GenericDonutChart = ({ data, labels, colors, emptyMsg, currency, t, isDark }) => {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);
    const total = data.reduce((acc, val) => acc + val, 0);

    useEffect(() => {
        if(total === 0) { if(chartRef.current) chartRef.current.destroy(); return; }
        if (canvasRef.current && window.Chart) {
            if (chartRef.current) chartRef.current.destroy();
            chartRef.current = new Chart(canvasRef.current.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: data, backgroundColor: colors, borderWidth: 0, hoverOffset: 8 }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    cutout: '75%', 
                    plugins: { 
                        legend: { 
                            position: window.innerWidth < 640 ? 'bottom' : 'right', 
                            labels: { 
                                color: isDark ? '#ffffff' : '#333333', 
                                padding: 15, 
                                font: { size: 11 },
                                generateLabels: (chart) => {
                                    const d = chart.data;
                                    if (d.labels.length && d.datasets.length) {
                                        return d.labels.map((label, i) => ({
                                            text: (t && t.valMap && t.valMap[label]) || label,
                                            fillStyle: d.datasets[0].backgroundColor[i],
                                            hidden: isNaN(d.datasets[0].data[i]) || chart.getDatasetMeta(0).data[i].hidden,
                                            index: i,
                                            fontColor: isDark ? '#ffffff' : '#333333'
                                        }));
                                    }
                                    return [];
                                }
                            } 
                        }, 
                        tooltip: { callbacks: { label: (ctx) => ' ' + formatNum(ctx.raw) + (currency ? ' ' + currency : '') } },
                        datalabels: {
                            color: isDark ? '#ffffff' : '#333333',
                            font: { weight: 'bold', size: 11 },
                            textAlign: 'center',
                            textStrokeColor: isDark ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.8)',
                            textStrokeWidth: 2,
                            formatter: (value, ctx) => {
                                let sum = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                if ((value * 100 / sum) < 5) return null;
                                let percentage = (value * 100 / sum).toFixed(1) + "%";
                                let rawLabel = ctx.chart.data.labels[ctx.dataIndex];
                                let label = (t && t.valMap && t.valMap[rawLabel]) || rawLabel;
                                return [label, percentage];
                            },
                            display: true,
                            anchor: 'center',
                            align: 'center',
                            offset: 0
                        }
                    } 
                }
            });
        }
        return () => { if(chartRef.current) chartRef.current.destroy(); }
    }, [data, labels, colors, total, currency, t, isDark]);

    if (total === 0) return <div className="h-48 flex items-center justify-center border border-slate-300 dark:border-slate-700/50 rounded-2xl bg-white dark:bg-slate-800/20 shadow-sm dark:shadow-none"><p className="text-slate-500 text-sm">{emptyMsg}</p></div>;
    return <div className="h-48 sm:h-56 w-full"><canvas ref={canvasRef}></canvas></div>;
};

const SurvivalLineChart = ({ assets, debts, funds, expenses, expectedReturn, inflationRate, emptyMsg, currency, labelMsg, monthsMsg, age, isDark, lang, t }) => {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);
    useEffect(() => {
        if (expenses <= 0) { if (chartRef.current) chartRef.current.destroy(); return; }
        if (canvasRef.current && window.Chart) {
            if (chartRef.current) chartRef.current.destroy();
            const liquidNetWorth = assets - debts;
            const labels = [], data = [];
            const startAge = Number(typeof age === 'undefined' ? 40 : age);
            
            let currentAssets = liquidNetWorth;
            let currentAnnualExpenses = expenses * 12;
            let zeroYear = 40;
            let isSustainable = true;

            for(let y = 1; y <= 40; y++) {
                currentAssets = (currentAssets * (1 + expectedReturn / 100)) - currentAnnualExpenses;
                currentAnnualExpenses = currentAnnualExpenses * (1 + inflationRate / 100);
                
                const labelText = lang === 'en' ? `${y}Y (${startAge + y})` : `${y}년 (${startAge + y}세)`;
                labels.push(labelText);
                data.push(currentAssets > 0 ? Math.floor(currentAssets) : 0);

                if (currentAssets <= 0) {
                    zeroYear = y;
                    isSustainable = false;
                    break;
                }
            }
            
            // Limit display to zeroYear + 2 for better visibility, or 40 if sustainable
            const displayData = isSustainable ? data : data.slice(0, Math.min(zeroYear + 2, data.length));
            const displayLabels = isSustainable ? labels : labels.slice(0, Math.min(zeroYear + 2, labels.length));

            chartRef.current = new Chart(canvasRef.current.getContext('2d'), {
                type: 'line',
                data: { 
                    labels: displayLabels, 
                    datasets: [{ 
                        label: `${labelMsg} (${currency})`, 
                        data: displayData, 
                        borderColor: isSustainable ? '#10b981' : '#0ea5e9', 
                        backgroundColor: isSustainable ? 'rgba(16, 185, 129, 0.1)' : 'rgba(14, 165, 233, 0.1)', 
                        borderWidth: 3, 
                        fill: true, 
                        tension: 0.1 
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: { callbacks: { label: (ctx) => ' ' + formatNum(ctx.raw) + (currency ? ' ' + currency : '') } },
                        datalabels: {
                            display: (ctx) => isSustainable && ctx.dataIndex === ctx.dataset.data.length - 1,
                            formatter: () => t.sustainable || 'Sustainable',
                            color: '#10b981',
                            font: { weight: 'bold', size: 12 },
                            align: 'top',
                            anchor: 'end',
                            offset: 10,
                            backgroundColor: isDark ? 'rgba(15, 23, 42, 0.9)' : 'rgba(255, 255, 255, 0.9)',
                            padding: 6,
                            borderRadius: 8,
                            borderWidth: 1,
                            borderColor: '#10b981'
                        }
                    }, 
                    scales: { 
                        y: { 
                            grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' },
                            ticks: { 
                                color: isDark ? '#64748b' : '#94a3b8',
                                callback: (value) => {
                                    if (lang === 'en') return (value / 1000000).toFixed(0) + 'M';
                                    return (value / 100000000).toFixed(1) + '억';
                                }
                            } 
                        }, 
                        x: { 
                            grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' }, 
                            ticks: { color: isDark ? '#64748b' : '#94a3b8' } 
                        } 
                    } 
                }
            });
        }
        return () => { if(chartRef.current) chartRef.current.destroy(); }
    }, [assets, debts, funds, expenses, expectedReturn, inflationRate, currency, labelMsg, monthsMsg, age, isDark, lang, t]);
    if (expenses <= 0) return <div className="h-48 flex items-center justify-center border border-slate-300 dark:border-slate-700/50 rounded-2xl bg-white dark:bg-slate-800/20 shadow-sm dark:shadow-none"><p className="text-slate-500 text-sm">{emptyMsg}</p></div>;
    return <div className="h-48 sm:h-56 w-full"><canvas ref={canvasRef}></canvas></div>;
};

const StockAutocomplete = ({ value, onChange, placeholder, className, t }) => {
    const [focused, setFocused] = useState(false);
    const [search, setSearch] = useState(value);
    const [options, setOptions] = useState([]);
    const [loading, setLoading] = useState(false);
    const timerRef = useRef(null);
    
    useEffect(() => { setSearch(value); }, [value]);

    const fetchStocks = async (query) => {
        if (!query.trim()) {
            setOptions([]);
            return;
        }
        setLoading(true);
        const normQ = query.toLowerCase();
        let results = CORE_STOCKS.filter(s => 
            s.name.toLowerCase().includes(normQ) || 
            s.ticker.toLowerCase().includes(normQ)
        ).slice(0, 10);

        // 1. Yahoo Finance Fallback (Hybrid)
        if (query.length > 1) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const resp = await fetch(`https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&lang=ko-KR&region=KR&quotesCount=10&newsCount=0`, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (resp.ok) {
                    const data = await resp.json();
                    const yahoo = (data.quotes || []).map(q => ({
                        name: q.shortname || q.longname || q.symbol,
                        ticker: q.symbol,
                        type: 'External'
                    }));
                    const tickers = new Set(results.map(r => r.ticker));
                    yahoo.forEach(item => {
                        if (!tickers.has(item.ticker)) {
                            results.push(item);
                            tickers.add(item.ticker);
                        }
                    });
                }
            } catch (e) {
                console.warn("Yahoo API Fallback skipped (CORS/Network)");
            }
        }

        setOptions(results.slice(0, 30));
        setLoading(false);
    };

    const handleSearchChange = (e) => {
        const val = e.target.value;
        setSearch(val);
        onChange(val); // Real-time sync for manual typing
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
            fetchStocks(val);
        }, 500);
    };

    return (
        <div className="relative w-full">
            <input 
                type="text" 
                value={search} 
                onChange={handleSearchChange}
                onFocus={() => { setFocused(true); fetchStocks(search); }}
                onBlur={() => setTimeout(() => setFocused(false), 200)}
                onKeyDown={(e) => {
                    if (e.key === 'Enter') {
                        e.target.blur();
                    }
                }}
                placeholder={placeholder} 
                className={className} 
                autoComplete="off"
            />
            {focused && (search || options.length > 0) && (
                <ul className="absolute z-[9999] w-full mt-1 max-h-64 overflow-y-auto overscroll-contain bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg shadow-2xl list-none p-0 m-0">
                    {loading && options.length === 0 ? (
                        <li className="px-4 py-3 text-sm text-slate-500 text-center">{t.searching || 'Searching...'}</li>
                    ) : options.length > 0 ? (
                        options.map((s, idx) => (
                            <li 
                                key={`${s.ticker}-${idx}`} 
                                onMouseDown={(e) => {
                                    e.preventDefault();
                                    const val = s.name === search ? s.name : `${s.name} (${s.ticker})`;
                                    setSearch(val);
                                    onChange(val);
                                    setFocused(false);
                                }}
                                className="px-4 py-3 hover:bg-gray-100 dark:hover:bg-slate-700 cursor-pointer text-sm border-b border-gray-100 dark:border-slate-700/50 last:border-0 transition-colors"
                            >
                                <div className="flex justify-between items-center">
                                    <span className="font-bold text-gray-800 dark:text-slate-200">
                                        {s.name}
                                    </span>
                                    {s.ticker && (
                                        <span className="text-[10px] text-gray-500 dark:text-gray-400 ml-2 bg-gray-100 dark:bg-slate-900 px-1.5 py-0.5 rounded italic">
                                            {s.ticker}
                                        </span>
                                    )}

                                </div>
                            </li>
                        ))
                    ) : search ? (
                        <li className="px-4 py-3 text-sm text-slate-500 text-center">{t.noResults || 'No results'}</li>
                    ) : null}
                </ul>
            )}
        </div>
    );
};

        }
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });

        a.href = url;

                                        const item = funds[key];
                                        return (
                                            <button key={key} type="button" onClick={toggleActive(setFunds, key)} className={`px-3 py-2 sm:py-1.5 rounded-xl text-[10px] sm:text-xs font-bold transition-all flex items-center gap-2 ${item.active ? 'bg-emerald-100 dark:bg-emerald-600/20 text-emerald-600 dark:text-emerald-400 border border-emerald-300 dark:border-emerald-500/50' : 'bg-slate-100 dark:bg-slate-800/50 text-slate-500 border border-slate-300 dark:border-slate-700/50 hover:bg-slate-200 dark:hover:bg-slate-800'}`}>
                                                <div className={`w-2 h-2 rounded-full ${item.active ? 'bg-emerald-500' : 'bg-slate-300 dark:bg-slate-700'}`}></div>{t['fund_' + key] || item.label}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6">
                                {Object.keys(funds).filter(k => funds[k].active).map(key => {
                                    const item = funds[key];
                                    const catTarget = getCatSum(item, 'v1');
                                    const catCurrent = getCatSum(item, 'v2');
                                    const progress = catTarget === 0 ? 0 : Math.min(Math.max((catCurrent / catTarget) * 100, 0), 100).toFixed(1);
                                    return (
                                        <div key={key} className="bg-white dark:bg-slate-800/40 border border-slate-300 dark:border-slate-700/50 shadow-sm dark:shadow-none rounded-2xl p-5">
                                            <div className="flex justify-between items-center mb-5">
                                                <h5 className="font-bold text-emerald-600 dark:text-emerald-300 text-sm">{t['fund_' + key] || item.label}</h5>
                                                <span className="text-xs font-black text-emerald-600 dark:text-emerald-400 bg-emerald-100 dark:bg-emerald-500/10 px-2 py-0.5 rounded-full">{progress}%</span>
                                            </div>
                                            <div className="space-y-3 mb-5">
                                                {item.items.map(subItem => (
                                                    <div key={subItem.id} className="grid grid-cols-1 sm:grid-cols-3 gap-2 relative pr-8 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-200 dark:border-slate-700">
                                                        <button onClick={() => removeSubItem(setFunds, key, subItem.id)} className="absolute right-1 top-2 text-slate-400 dark:text-slate-500 hover:text-red-500 font-bold p-2">✕</button>
                                                        <select value={subItem.name} onChange={(e) => updateSubItem(setFunds, key, subItem.id, 'name', e.target.value)} className="w-full form-input-standard px-3 text-xs sm:text-sm text-slate-800 dark:text-white">
                                                            <option value="" disabled hidden>{t.fundNameExample}</option>
                                                            {(key === 'gold' ? GOLD_INSTS : key === 'insurance' ? INSURE_INSTS : FIN_INSTS).map(o => <option key={o} value={o}>{t.valMap[o] || o}</option>)}
                                                        </select>
                                                        <input type="text" value={subItem.v1} onChange={(e) => { const v = e.target.value.replace(/[^0-9]/g, ''); updateSubItem(setFunds, key, subItem.id, 'v1', v ? formatNum(v) : ''); }} placeholder={t.targetAmount} className="w-full form-input-standard px-3 text-xs sm:text-sm text-slate-800 dark:text-white" />
                                                        <input type="text" value={subItem.v2} onChange={(e) => { const v = e.target.value.replace(/[^0-9]/g, ''); updateSubItem(setFunds, key, subItem.id, 'v2', v ? formatNum(v) : ''); }} placeholder={t.currentAmount} className="w-full form-input-standard px-3 text-xs sm:text-sm text-slate-800 dark:text-white" />
                                                    </div>
                                                ))}
                                                <button onClick={() => addSubItem(setFunds, key)} className="w-full py-3 bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-xs font-bold rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-[var(--primary-color)] hover:border-[var(--primary-color)] transition-colors uppercase tracking-widest">{t.addAsset || t.addBtn}</button>
                                            </div>
                                            <div className="w-full bg-slate-200 dark:bg-slate-900 h-1.5 rounded-full overflow-hidden"><div className="bg-emerald-500 h-full transition-all duration-500" style={{ width: `${progress}%` }}></div></div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                )}

                {/* 4. 부업 및 법률 (Premium) 탭 */}
                {activeTab === 4 && (
                    <div className="tab-content">
                        <div className="text-center mb-10 pt-4">
                            <h2 className="text-3xl font-black text-slate-900 dark:text-white mb-4 flex items-center justify-center gap-3"><span className="text-yellow-400">👑</span> Premium Masterclass</h2>
                            <p className="text-slate-500 dark:text-slate-400 max-w-xl mx-auto">{t.premiumDesc}</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 sm:gap-8">
                            <div className="glass-panel p-6 sm:p-8 rounded-[2rem] flex flex-col h-full border border-yellow-500/20 bg-gradient-to-b from-white dark:from-slate-900 to-yellow-50/50 dark:to-yellow-900/10 hover:-translate-y-2 transition-transform duration-300 shadow-xl shadow-yellow-500/5">
                                <div className="text-4xl mb-6">📱</div>
                                <h3 className="text-xl font-bold text-slate-900 dark:text-white mb-3">{t.premiumTitle1}</h3>
                                <p className="text-sm text-slate-600 dark:text-slate-400 flex-grow mb-8 leading-relaxed">{t.premiumDesc1}</p>
                                <button onClick={() => alert(t.premiumAlert)} className="w-full py-3.5 rounded-xl bg-gradient-to-r from-yellow-500 to-amber-500 text-amber-950 font-black text-sm hover:shadow-lg hover:shadow-yellow-500/30 transition-all">{t.readNow}</button>
                            </div>
                            <div className="glass-panel p-6 sm:p-8 rounded-[2rem] flex flex-col h-full border border-red-500/20 bg-gradient-to-b from-white dark:from-slate-900 to-red-50/50 dark:to-red-900/10 hover:-translate-y-2 transition-transform duration-300 shadow-xl shadow-red-500/5">
                                <div className="text-4xl mb-6">⚖️</div>
                                <h3 className="text-xl font-bold text-slate-900 dark:text-white mb-3">{t.premiumTitle2}</h3>
                                <p className="text-sm text-slate-600 dark:text-slate-400 flex-grow mb-8 leading-relaxed">{t.premiumDesc2}</p>
                                <button onClick={() => alert(t.premiumAlert)} className="w-full py-3.5 rounded-xl bg-gradient-to-r from-red-500 to-rose-500 text-white font-black text-sm hover:shadow-lg hover:shadow-red-500/30 transition-all">{t.readNow}</button>
                            </div>
                            <div className="glass-panel p-6 sm:p-8 rounded-[2rem] flex flex-col h-full border border-blue-500/20 bg-gradient-to-b from-white dark:from-slate-900 to-blue-50/50 dark:to-blue-900/10 hover:-translate-y-2 transition-transform duration-300 shadow-xl shadow-blue-500/5 relative overflow-hidden">
                                <div className="absolute inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-sm z-10 flex items-center justify-center rounded-[2rem]">
                                    <span className="px-4 py-2 border-2 border-slate-500 text-slate-300 font-bold rounded-lg tracking-widest uppercase origin-center -rotate-12">{t.comingSoon}</span>
                                </div>
                                <div className="text-4xl mb-6">💎</div>
                                <h3 className="text-xl font-bold text-slate-900 dark:text-white mb-3">{t.premiumTitle3}</h3>
                                <p className="text-sm text-slate-600 dark:text-slate-400 flex-grow mb-8 leading-relaxed">{t.premiumDesc3}</p>
                                <button disabled className="w-full py-3.5 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-500 font-black text-sm cursor-not-allowed">{t.comingSoon}</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>

            {/* 프리미엄 모달 창 */}
            {showPremiumModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-950/70 backdrop-blur-md" onClick={() => setShowPremiumModal(false)}></div>
                    <div className="relative z-10 w-full max-w-sm bg-slate-900 border border-yellow-500/30 rounded-3xl p-8 text-center shadow-2xl tab-content">
                        <h3 className="text-2xl font-black text-white mb-3 flex items-center justify-center gap-2"><span className="text-yellow-400">👑</span> {t.premiumUnlock}</h3>
                        <p className="text-slate-400 mb-6 text-sm">{t.premiumDesc}</p>
                        <button className="w-full bg-gradient-to-r from-yellow-500 to-amber-500 text-amber-950 font-black py-4 px-6 rounded-xl hover:opacity-90 transition-opacity">{t.premiumBtn}</button>
                        <button onClick={() => setShowPremiumModal(false)} className="mt-4 text-xs font-bold text-slate-500 hover:text-slate-400">{t.premiumLater}</button>
                    </div>
                </div>
            )}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

// PWA Service Worker Registration
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered:', reg);
        }).catch(err => {
            console.log('SW registration failed:', err);
        });
    });
}
</script>

</body></html>
